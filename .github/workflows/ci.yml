name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - name: gofmt
        run: test -z "$(gofmt -l internal cmd)"
      - name: Test (incl. schema-snapshot gate)
        run: go test ./...
      - name: Static (CGO-off) build
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/ufi
